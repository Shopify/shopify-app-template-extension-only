name: Update JavaScript branch

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  convert-ts-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20.x

      - name: Install dependencies
        run: |
          pnpm install
          pnpm add -D prettier eslint-plugin-import

      - name: Create temporary tsconfig file for transpilation
        run: |
          echo '{
            "include": ["./home/**/*", "./shared/**/*", "*.ts", ".graphqlrc.ts"],
            "compilerOptions": {
              "lib": ["ES2020", "DOM", "DOM.Iterable"],
              "strict": true,
              "skipLibCheck": true,
              "isolatedModules": true,
              "allowSyntheticDefaultImports": true,
              "removeComments": false,
              "forceConsistentCasingInFileNames": true,
              "noEmitOnError": true,
              "allowJs": true,
              "resolveJsonModule": true,
              "jsx": "react-jsx",
              "jsxImportSource": "preact",
              "module": "ESNext",
              "moduleResolution": "bundler",
              "target": "ES2020",
              "baseUrl": ".",
              "types": ["vite/client", "@shopify/app-bridge-types", "@shopify/polaris-types"]
            }
          }' > tsconfig.js.json

      - name: Transpile to Javascript
        run: pnpm tsc -p tsconfig.js.json

      - name: Remove Typescript files
        run: |
          find home shared \( -name "*.ts" -o -name "*.tsx" \) -delete
          find . \( -name ".graphqlrc.ts" -o -name "tsconfig.js.json" -o -name "vite.config.ts" \) -delete

      - name: Update index.html entry point
        run: sed -i 's|index.tsx|index.jsx|g' home/index.html

      - name: Run prettier
        run: pnpm prettier -w "home/**/*.{js,jsx}" "shared/**/*.{js,jsx}" ".graphqlrc.js" "vite.config.js"

      - name: Run ESLint
        run: |
          cat > eslint.config.js << 'ESLINTEOF'
          import importPlugin from "eslint-plugin-import";
          export default [
            importPlugin.flatConfigs.recommended,
            {
              languageOptions: {
                ecmaVersion: "latest",
              },
              rules: {
                "import/order": "error",
                "import/newline-after-import": "error",
                "padding-line-between-statements": ["error",
                  { "blankLine": "always", "prev": ["const", "let", "var"], "next": "*" },
                  { "blankLine": "any",    "prev": ["const", "let", "var"], "next": ["const", "let", "var"] },
                  { "blankLine": "always", "prev": "*", "next": "return" },
                  { "blankLine": "always", "prev": "*", "next": "export" },
                  { "blankLine": "never",  "prev": "export", "next": "export" },
                  { "blankLine": "always", "prev": "*", "next": "block-like" },
                  { "blankLine": "always", "prev": "block-like", "next": "*" }
                ]
              }
            }
          ];
          ESLINTEOF
          pnpm eslint "home/**/*.{js,jsx}" "shared/**/*.{js,jsx}" ".graphqlrc.js" "vite.config.js" --fix --no-cache
          rm eslint.config.js

      - name: Prepare files for git
        run: |
          git config user.name GitHub
          git config user.email noreply@github.com
          git fetch
          git restore --staged package.json
          git restore package.json

      - name: Stage changes to files
        run: |
          git add .
          git checkout -b temp_javascript_updates
          git commit -m "Convert template to Javascript"
          git fetch origin javascript || git checkout -b javascript main
          git checkout -
          git rebase -m -X theirs javascript
          git push -f origin temp_javascript_updates:javascript_updates

      - name: Create Javascript PR
        run: |
          gh pr view --json mergedAt -q ".mergedAt" javascript_updates | grep -E "^$" || \
          gh pr create -B javascript -H javascript_updates --title 'Convert template to Javascript' --body 'This is an automated PR that converts the latest changes from Typescript to Javascript'
        env:
          GH_TOKEN: ${{ github.token }}
