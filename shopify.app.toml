# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration
client_id = ""
name = ""
application_url = "https://extensions.shopifycdn.com"
embedded = true

[admin]
# Learn more about content requirements at https://shopify.dev/docs/apps/launch/deployment/hosted-apps#content-requirements 
static_root = "./dist"

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

[access.admin]
direct_api_mode = "online"
embedded_app_direct_api_access = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_metaobject_definitions,write_metaobjects,write_products"

[auth]
redirect_urls = [ "https://shopify.dev/apps/default-app-home/api/auth" ]

[metaobjects.app.faq]
name = "FAQ"

[metaobjects.app.faq.fields.question]
name = "Question"
type = "single_line_text_field"
required = true

[metaobjects.app.faq.fields.answer]
name = "Answer"
type = "multi_line_text_field"
required = true

[metaobjects.app.faq.fields.show_on_faq_page]
name = "Show on FAQ page"
type = "boolean"

[product.metafields.app.faq]
name = "FAQ"
description = "FAQ for this product"
type = "metaobject_reference<$app:faq>"

  [product.metafields.app.faq.access]
  admin = "merchant_read_write"

[sidekick]
extensions_summary = "Read FAQ entries stored in the app"
